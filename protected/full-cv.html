<style>
  :root {
    --navy: #0d1f3c; --navy-mid: #162d52; --navy-light: #1e3e6e;
    --gold: #c9a84c; --gold-light: #e8c97a;
    --white: #ffffff; --off-white: #f7f8fc;
    --radius: 12px; --transition: .35s cubic-bezier(.4,0,.2,1);

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;

  .card {
    max-width: 560px; width: 100%;
    background: rgba(255,255,255,.06);

  h1 {

    font-size: 1.8rem; color: var(--gold-light);

  }
  .sub { color: rgba(255,255,255,.6); font-size: .9rem; margin-bottom: 2rem; }
  .row {
    display: flex; align-items: flex-start; gap: .85rem;
    margin-bottom: 1.1rem; font-size: .95rem;
  }
  .icon {
    width: 34px; height: 34px; border-radius: 8px;
    background: rgba(201,168,76,.15);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: .9rem;
  }
  a { color: rgba(255,255,255,.9); text-decoration: none; }
  a:hover { color: var(--gold-light); }
  .download-btn {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 1.5rem;
    padding: 12px 26px;
    background: var(--gold); color: var(--navy);
    font-weight: 600; font-size: .85rem;
    border-radius: var(--radius);
    transition: background var(--transition), transform var(--transition);
  }
  .download-btn:hover { background: var(--gold-light); transform: translateY(-2px); }
  .back { display: inline-block; margin-top: 2rem; font-size: .82rem; color: rgba(255,255,255,.5); }
